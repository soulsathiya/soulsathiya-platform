services:
  - type: web
    name: soulsathiya-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: soulsathiya
      - key: CORS_ORIGINS
        value: "http://localhost:3000,https://soulsathiya.vercel.app,https://www.soulsathiya.com,https://soulsathiya.com"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_REQUIRE_PASSWORD_CHANGE
        value: "true"
      # PRODUCTION: Set to a live key (rzp_live_...) in the Render dashboard.
      # Using a test key (rzp_test_...) causes Razorpay to show a "Test Mode"
      # banner in the payment widget, which is visible to end users.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
